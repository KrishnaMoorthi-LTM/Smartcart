<div class="home-container">

  <!-- BANNER SECTION -->
  <div class="banner" [style.background]="bannerSlides[currentSlide].bg">
    <div class="banner-content" [style.color]="bannerSlides[currentSlide].color">
      <h1>{{ bannerSlides[currentSlide].title }}</h1>
      <p>{{ bannerSlides[currentSlide].subtitle }}</p>
      <button mat-raised-button (click)="goToProducts()">
        Shop Now
      </button>
    </div>
    <!-- Dots -->
    <div class="banner-dots">
      <span
        *ngFor="let slide of bannerSlides; let i = index"
        class="dot"
        [class.active]="i === currentSlide"
        (click)="currentSlide = i">
      </span>
    </div>
  </div>

  <!-- CATEGORIES SECTION -->
  <div class="section">
    <h2 class="section-title">Shop by Category</h2>
    <div class="categories-grid">
      <div
        class="category-card"
        *ngFor="let cat of categories"
        (click)="goToProducts(cat.filter)">
        <span class="category-icon">{{ cat.icon }}</span>
        <span class="category-name">{{ cat.name }}</span>
      </div>
    </div>
  </div>

  <!-- FEATURED PRODUCTS SECTION -->
  <div class="section">
    <h2 class="section-title">Featured Products</h2>

    <!-- Loading -->
    <div *ngIf="isLoading" class="loading">
      <p>Loading products...</p>
    </div>

    <!-- Products Grid -->
    <div class="products-grid" *ngIf="!isLoading">
      <div
        class="product-card"
        *ngFor="let product of featuredProducts"
        (click)="goToProductDetail(product.id!)">

        <div class="product-image-wrapper">
          <img
            [src]="product.image"
            [alt]="product.name"
            (error)="onImageError($event)"
            class="product-image">
        </div>

        <div class="product-info">
          <h3 class="product-name">{{ product.name }}</h3>
          <p class="product-price">₹{{ product.price | number }}</p>
          <p class="product-desc">{{ product.description }}</p>
        </div>

      </div>
    </div>

    <!-- View All Button -->
    <div class="view-all">
      <button mat-raised-button color="primary" (click)="goToProducts()">
        View All Products
      </button>
    </div>

  </div>

</div>
