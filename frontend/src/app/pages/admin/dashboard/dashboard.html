<div class="dashboard-container">

  <h2 class="dashboard-title">⚙️ Admin Dashboard</h2>

  <!-- Stats Cards -->
  <div class="stats-grid">

    <div class="stat-card blue">
      <div class="stat-icon">📦</div>
      <div class="stat-info">
        <h3>Total Products</h3>
        <p>{{ totalProducts }}</p>
      </div>
    </div>

    <div class="stat-card green">
      <div class="stat-icon">🏪</div>
      <div class="stat-info">
        <h3>Total Stock</h3>
        <p>{{ totalStock }}</p>
      </div>
    </div>

<div class="stat-card orange" (click)="goToLowStock()" style="cursor:pointer;">
     <div class="stat-icon">⚠️</div>
      <div class="stat-info">
        <h3>Low Stock Items</h3>
        <p>{{ lowStockProducts.length }}</p>
      </div>
    </div>

  </div>

  <!-- Quick Actions -->
  <div class="section">
    <h3 class="section-title">Quick Actions</h3>
    <div class="actions">
      <button class="btn-action blue" (click)="goToManageProducts()">
        📋 Manage Products
      </button>
      <button class="btn-action green" (click)="goToAddProduct()">
        ➕ Add New Product
      </button>
      <button class="btn-action orange" (click)="goToOrders()">
  📦 Manage Orders
</button>
<button class="btn-action purple" *ngIf="isAdmin()" (click)="goToUsers()">
  👥 Manage Users
</button>
    </div>
  </div>

  <!-- Low Stock Warning -->
  <div class="section" *ngIf="lowStockProducts.length > 0">
    <h3 class="section-title">⚠️ Low Stock Products</h3>
    <div class="low-stock-list">
      <div class="low-stock-item" *ngFor="let product of lowStockProducts">
        <span class="product-name">{{ product.name }}</span>
        <span class="stock-badge">{{ product.quantity }} left</span>
      </div>
    </div>
  </div>

</div>
