<div class="form-container">

  <!-- Header -->
  <div class="form-header">
    <button class="back-btn" (click)="goBack()">← Back</button>
    <h2>{{ isEditMode ? '✏️ Edit Product' : '➕ Add New Product' }}</h2>
  </div>

  <!-- Form Card -->
  <div class="form-card">

    <!-- Name -->
    <div class="form-group">
      <label>Product Name *</label>
      <input
        type="text"
        [(ngModel)]="product.name"
        placeholder="Enter product name"
        class="form-input">
    </div>

    <!-- Price -->
    <div class="form-group">
      <label>Price (₹) *</label>
      <input
        type="number"
        [(ngModel)]="product.price"
        placeholder="Enter price"
        class="form-input">
    </div>

    <!-- Quantity -->
    <div class="form-group">
      <label>Quantity *</label>
      <input
        type="number"
        [(ngModel)]="product.quantity"
        placeholder="Enter quantity"
        class="form-input">
    </div>

    <!-- Image -->
    <div class="form-group">
      <label>Image Path</label>
      <input
        type="text"
        [(ngModel)]="product.image"
        placeholder="e.g. assets/images/mobile.jpg"
        class="form-input">
      <!-- Image Preview -->
      <div class="image-preview" *ngIf="product.image">
        <img
          [src]="product.image || 'https://via.placeholder.com/150x150?text=No+Image'"
          alt="Preview"
          class="preview-img">
      </div>
    </div>

    <!-- Description -->
    <div class="form-group">
      <label>Description</label>
      <textarea
        [(ngModel)]="product.description"
        placeholder="Enter product description"
        class="form-input"
        rows="4">
      </textarea>
    </div>

    <!-- Buttons -->
    <div class="form-actions">
      <button class="btn-cancel" (click)="goBack()">
        Cancel
      </button>
      <button
        class="btn-save"
        (click)="saveProduct()"
        [disabled]="isLoading">
        {{ isLoading ? 'Saving...' : (isEditMode ? 'Update Product' : 'Add Product') }}
      </button>
    </div>

  </div>

</div>
