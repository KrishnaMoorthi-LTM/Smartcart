<div class="checkout-container">

  <!-- Order Placed Success -->
<div *ngIf="orderPlaced" class="order-success">
  <div class="success-icon">✅</div>
  <h2>Order Placed Successfully!</h2>
  <p>Thank you for shopping with Smartcart!</p>
  <div class="success-actions">
    <button class="btn-continue" (click)="continueShopping()">
      Continue Shopping
    </button>
    <button class="btn-orders" (click)="viewOrders()">
      View My Orders
    </button>
  </div>
</div>

  <!-- Checkout Form -->
  <div *ngIf="!orderPlaced" class="checkout-content">

    <h2 class="checkout-title">🧾 Checkout</h2>

    <div class="checkout-layout">

      <!-- Left - Delivery Details -->
      <div class="delivery-section">

        <h3>Delivery Details</h3>

        <div class="form-group">
          <label>Full Name</label>
          <input
            type="text"
            [(ngModel)]="name"
            placeholder="Enter your full name"
            class="form-input">
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input
            type="text"
            [(ngModel)]="phone"
            placeholder="Enter your phone number"
            class="form-input">
        </div>

        <div class="form-group">
          <label>Address</label>
          <textarea
            [(ngModel)]="address"
            placeholder="Enter your full address"
            class="form-input"
            rows="3">
          </textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>City</label>
            <input
              type="text"
              [(ngModel)]="city"
              placeholder="City"
              class="form-input">
          </div>

          <div class="form-group">
            <label>Pincode</label>
            <input
              type="text"
              [(ngModel)]="pincode"
              placeholder="Pincode"
              class="form-input">
          </div>
        </div>

      </div>

      <!-- Right - Order Summary -->
      <div class="order-summary">

        <h3>Order Summary</h3>

        <div class="order-items">
          <div class="order-item" *ngFor="let item of cartItems">
            <span>{{ item.product.name }} x {{ item.quantity }}</span>
            <span>₹{{ item.product.price * item.quantity | number }}</span>
          </div>
        </div>

        <div class="order-divider"></div>

        <div class="order-total">
          <span>Total</span>
          <span>₹{{ totalPrice | number }}</span>
        </div>

        <button class="btn-order" (click)="placeOrder()">
          Place Order
        </button>

      </div>

    </div>

  </div>

</div>
